<script type="text/babel">
const { createClient } = supabase;
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqeHliemhya2xxZWNib3pmdGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDg4NzUsImV4cCI6MjA5ODIyNDg3NX0.pYxfzQk9OInvfrwObue68dxKJibmjQlhCxNxg5JOROw';

// ── PAYROLL ENGINE ────────────────────────────────────────────────────────────
const EMP_SI = 0.11, ER_SI = 0.1875, SI_MIN = 2700, SI_MAX = 16700, PERS_EX = 20000;
const BRACKETS = [{l:40000,r:0},{l:55000,r:.10},{l:70000,r:.15},{l:200000,r:.20},{l:400000,r:.225},{l:Infinity,r:.275}];

function calcTax(t) {
  if (t <= 0) return 0;
  let tax = 0, prev = 0;
  for (const b of BRACKETS) {
    if (t <= prev) break;
    tax += (Math.min(t, b.l) - prev) * b.r;
    prev = b.l;
    if (b.l === Infinity) break;
  }
  return tax;
}

function netFromAnnualGross(g) {
  const si = Math.min(Math.max(g/12, SI_MIN), SI_MAX) * EMP_SI * 12;
  return g - si - calcTax(Math.max(g - si - PERS_EX, 0));
}

function grossUp(targetNet) {
  let lo = targetNet * 12, hi = targetNet * 36;
  for (let i = 0; i < 60; i++) {
    const mid = (lo + hi) / 2;
    netFromAnnualGross(mid) < targetNet * 12 ? lo = mid : hi = mid;
  }
  return (lo + hi) / 2 / 12;
}

function proRata(hireDate, closingDate) {
  const c = new Date(closingDate), h = new Date(hireDate);
  const ms = new Date(c.getFullYear(), c.getMonth(), 1);
  if (h <= ms) return 1;
  const dim = new Date(c.getFullYear(), c.getMonth() + 1, 0).getDate();
  return Math.min(1, Math.max(0, (c - h) / 86400000 + 1) / dim);
}

function leaveEntitlement(hireDateStr, year) {
  const hire = new Date(hireDateStr);
  const jan1 = new Date(year, 0, 1);
  const yearsService = (jan1 - hire) / (365.25 * 86400000);
  if (yearsService >= 10) return 30;
  if (yearsService >= 1)  return 21;
  if (yearsService >= 0.5) return 15;
  return 0;
}

function calcEmployee(emp, closingDate, adj = {}, fixedAllowances = [], leaveBal = null) {
  const factor   = proRata(emp.hire_date, closingDate);
  const gross    = grossUp(emp.target_net);
  const siBase   = Math.min(Math.max(gross, SI_MIN), SI_MAX);
  const empSi    = siBase * EMP_SI;
  const erSiAmt  = siBase * ER_SI;
  const annGross = gross * 12;
  const annSi    = siBase * EMP_SI * 12;
  const annTax   = calcTax(Math.max(annGross - annSi - PERS_EX, 0));
  const mTax     = annTax / 12;
  const dailyRate  = gross / 30;
  const hourlyRate = gross / 26 / 8;

  // OT
  const otHours = Number(adj.ot_hours || 0);
  const otRate  = adj.ot_rate_custom ? Number(adj.ot_rate_custom) : hourlyRate * 1.35;
  const otValue = otHours * otRate;

  // Lateness
  const lateDays  = Number(adj.late_days || 0);
  const lateHours = Number(adj.late_hours || 0);
  const lateValue = lateDays * dailyRate + lateHours * hourlyRate;

  // Leave
  const leaveDays = Number(adj.leave_days || 0);
  let leaveDeduction = 0, leaveFromBalance = 0, leaveFromSalary = 0;
  if (leaveDays > 0) {
    if (leaveBal && leaveBal.remaining_days >= leaveDays) {
      leaveFromBalance = leaveDays;
      leaveDeduction = 0;
    } else {
      const covered = leaveBal ? Math.min(leaveBal.remaining_days, leaveDays) : 0;
      leaveFromBalance = covered;
      leaveFromSalary  = leaveDays - covered;
      leaveDeduction   = leaveFromSalary * dailyRate;
    }
  }

  // Fixed allowances sum
  const fixedAllow = fixedAllowances.reduce((s, a) => s + Number(a.amount), 0);
  const varAllow   = Number(adj.variable_allowance || 0);
  const incentive  = Number(adj.incentive || 0);
  const penalty    = Number(adj.penalty_amount || 0);
  const loanDed    = Number(adj.loan_deduction || 0);
  const advance    = Number(adj.advance || 0);

  const totalEarnings  = gross + fixedAllow + varAllow + incentive + otValue;
  const totalDeductions= empSi + mTax + lateValue + leaveDeduction + penalty + loanDed + advance;
  const netFull        = totalEarnings - totalDeductions;

  return {
    employee_id: emp.id, emp_code: emp.emp_code,
    name: emp.full_name, department: emp.department, job_title: emp.job_title,
    hire_date: emp.hire_date, target_net: emp.target_net,
    pro_rata_factor: factor,
    gross_full: gross, si_base: siBase, emp_si: empSi, er_si: erSiAmt,
    annual_taxable: Math.max(annGross - annSi - PERS_EX, 0),
    monthly_tax: mTax,
    daily_rate: dailyRate, hourly_rate: hourlyRate,
    fixed_allowances: fixedAllow, variable_allowance: varAllow,
    incentive, ot_hours: otHours, ot_rate: otRate, ot_value: otValue,
    late_days: lateDays, late_hours: lateHours, late_value: lateValue,
    leave_days: leaveDays, leave_from_balance: leaveFromBalance,
    leave_from_salary: leaveFromSalary, leave_deduction: leaveDeduction,
    leave_bal_before: leaveBal ? leaveBal.remaining_days : null,
    leave_bal_after: leaveBal ? leaveBal.remaining_days - leaveFromBalance : null,
    penalty, penalty_reason: adj.penalty_reason || '',
    loan_deduction: loanDed, advance,
    total_earnings: totalEarnings,
    total_deductions: totalDeductions,
    net_full: netFull,
    // pro-rated dispensed
    dispensed_gross:      gross * factor,
    dispensed_allowances: (fixedAllow + varAllow + incentive) * factor,
    dispensed_ot:         otValue * factor,
    dispensed_emp_si:     empSi * factor,
    dispensed_tax:        mTax * factor,
    dispensed_late:       lateValue * factor,
    dispensed_leave_ded:  leaveDeduction * factor,
    dispensed_penalty:    penalty * factor,
    dispensed_loan:       loanDed * factor,
    dispensed_advance:    advance * factor,
    dispensed_total_earn: totalEarnings * factor,
    dispensed_total_ded:  totalDeductions * factor,
    dispensed_net:        netFull * factor,
    dispensed_er_si:      erSiAmt * factor,
    total_employer_cost:  (gross + erSiAmt) * factor,
  };
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
const fmt    = n => n == null ? '—' : Number(n).toLocaleString('en-EG',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => (n*100).toFixed(1)+'%';
const today  = () => new Date().toISOString().slice(0,10);
const mLabel = s => { if(!s) return ''; const d=new Date(s+'-01'); return d.toLocaleString('en',{month:'long',year:'numeric'}); };

// Employee ID generator: EMP-001 format
function nextEmpCode(employees) {
  const nums = employees
    .map(e => e.emp_code)
    .filter(Boolean)
    .map(c => parseInt(c.replace(/\D/g,''),10))
    .filter(n => !isNaN(n));
  const max = nums.length ? Math.max(...nums) : 0;
  return 'EMP-' + String(max + 1).padStart(3, '0');
}

function Field({ label, field, type='text', placeholder='', form, setForm, readOnly=false }) {

// ── BULK CSV HELPERS ──────────────────────────────────────────────────────────
const CSV_HEADERS = ['emp_code','full_name','national_id','department','job_title','hire_date','target_net','status','bank_name','account_number'];
const SAMPLE_ROWS = [
  ['EMP-001','Ahmed Hassan','29901011234567','Operations','Operations Manager','2023-03-01','12000','active','Banque Misr','1234567890123456'],
  ['EMP-002','Sara Mohamed','30005152345678','Finance','Senior Accountant','2024-06-15','9000','active','CIB','9876543210987654'],
  ['EMP-003','Khaled Ali','19801231345678','Sales','Sales Director','2022-01-10','18000','active','NBE','1122334455667788'],

function downloadCSV(headers, rows, filename) {
  const csv = [headers, ...rows].map(r => r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = filename; a.click();
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { error:'File is empty or has no data rows.' };
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  for (const r of ['full_name','hire_date','target_net']) {
    if (!headers.includes(r)) return { error:`Missing required column: "${r}"` };
  }
  const rows = [];
  for (let i=1;i<lines.length;i++) {
    if (!lines[i].trim()) continue;
    const vals=[]; let cur='',inQ=false;
    for (const ch of lines[i]) {
      if (ch==='"') inQ=!inQ;
      else if (ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,idx)=>{obj[h]=(vals[idx]||'').replace(/^"|"$/g,'').trim();});
    rows.push({_line:i+1,...obj});
  }
  return {headers,rows};
}

function validateEmpRow(row) {
  const e=[];
  if (!row.full_name) e.push('full_name required');
  if (!row.hire_date||!/^\d{4}-\d{2}-\d{2}$/.test(row.hire_date)) e.push('hire_date must be YYYY-MM-DD');
  if (!row.target_net||isNaN(Number(row.target_net))||Number(row.target_net)<=0) e.push('target_net must be positive number');
  if (row.status&&!['active','inactive'].includes(row.status)) e.push('status must be active or inactive');
  return e;
}

const BLANK_EMP = {emp_code:'',full_name:'',national_id:'',department:'',job_title:'',hire_date:'',target_net:'',status:'active',bank_name:'',account_number:''};

function EmpModal({ modal, form, setForm, saving, onClose, onSave }) {

      <div className="form-grid">

function BulkModal({ onClose, onDone, employees }) {
  const [step,setStep]=useState('idle');
  const [parsed,setParsed]=useState(null);
  const [results,setResults]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef(null);

  const handleFile = file => {
    if(!file||!file.name.endsWith('.csv')){alert('Please upload a .csv file.');return;}
    const r=new FileReader();
    r.onload=e=>{const res=parseCSV(e.target.result);if(res.error){alert(res.error);return;}setParsed(res);setStep('preview');};
    r.readAsText(file);
  };

  const upload = async () => {
    setStep('uploading');
    const valid=[],invalid=[];
    for (const row of parsed.rows) {
      const errs=validateEmpRow(row);
      if(errs.length){invalid.push({row,errs});continue;}
      // auto-generate emp_code if not in CSV
      valid.push({
        emp_code: row.emp_code || null, // will be set after we know max
        full_name:row.full_name, national_id:row.national_id||null,
        department:row.department||null, job_title:row.job_title||null,
        hire_date:row.hire_date, target_net:Number(row.target_net),
        status:row.status||'active', bank_name:row.bank_name||null,
        account_number:row.account_number||null,
      });
    }
    // assign emp_codes to those without
    const existing = employees.map(e=>e.emp_code).filter(Boolean).map(c=>parseInt(c.replace(/\D/g,''),10)).filter(n=>!isNaN(n));
    let counter = existing.length ? Math.max(...existing) : 0;
    valid.forEach(v=>{ if(!v.emp_code) v.emp_code='EMP-'+String(++counter).padStart(3,'0'); });

    let inserted=0,failed=0;
    if(valid.length){
      const {error}=await sb.from('employees').insert(valid);
      if(error){failed=valid.length;}else inserted=valid.length;
    }
    setResults({inserted,skipped:invalid,failed});
    setStep('done');
    if(inserted>0&&onDone) onDone();
  };

  const validRows  = parsed?parsed.rows.filter(r=>validateEmpRow(r).length===0):[];
  const invalidRows= parsed?parsed.rows.filter(r=>validateEmpRow(r).length>0):[];

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <div className="modal-title">
            {step==='idle'&&'Bulk Upload / Export'}
            {step==='preview'&&`Preview — ${parsed.rows.length} rows`}
            {step==='uploading'&&'Uploading…'}
            {step==='done'&&'Upload Complete'}
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {step==='idle'&&<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
              <div style={{border:'1px solid var(--border)',borderRadius:8,padding:18,textAlign:'center'}}>
                <div style={{fontSize:26,marginBottom:6}}>⬇</div>
                <div style={{fontWeight:600,marginBottom:4}}>Download Sample CSV</div>
                <div style={{color:'var(--ink-light)',fontSize:12,marginBottom:12}}>Template with correct headers + 3 example rows</div>
                <button className="btn btn-secondary" onClick={()=>downloadCSV(CSV_HEADERS,SAMPLE_ROWS,'Eterna_Employees_Sample.csv')}>Download Sample</button>
              </div>
              <div style={{border:'1px solid var(--border)',borderRadius:8,padding:18,textAlign:'center'}}>
                <div style={{fontSize:26,marginBottom:6}}>📤</div>
                <div style={{fontWeight:600,marginBottom:4}}>Export All Employees</div>
                <div style={{color:'var(--ink-light)',fontSize:12,marginBottom:12}}>Download all {employees.length} employees</div>
                <button className="btn btn-secondary" disabled={employees.length===0}
                  onClick={()=>downloadCSV(CSV_HEADERS,employees.map(e=>[e.emp_code||'',e.full_name,e.national_id||'',e.department||'',e.job_title||'',e.hire_date,e.target_net,e.status,e.bank_name||'',e.account_number||'']),`Eterna_Employees_${today()}.csv`)}>
                  Export All ({employees.length})
                </button>
              </div>
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:18}}>
              <div style={{fontWeight:600,marginBottom:10}}>Upload Employees CSV</div>
              <div style={{border:`2px dashed ${dragOver?'var(--maroon)':'var(--border)'}`,borderRadius:8,padding:32,textAlign:'center',background:dragOver?'var(--maroon-faint)':'var(--bg)',cursor:'pointer',transition:'all .15s'}}
                onClick={()=>fileRef.current.click()}
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}>
                <div style={{fontSize:28,marginBottom:6}}>📂</div>
                <div style={{fontWeight:500,marginBottom:3}}>Drop CSV here or click to browse</div>
                <div style={{fontSize:12,color:'var(--ink-light)'}}>CSV only · emp_code auto-assigned if blank</div>

              </div>

                Optional: <code>emp_code</code> (auto if blank), <code>national_id</code>, <code>department</code>, <code>job_title</code>, <code>status</code>, <code>bank_name</code>, <code>account_number</code>
              </div>
            </div>
          </>}

          {step==='preview'&&<>
            <div style={{display:'flex',gap:10,marginBottom:14}}>
              <div style={{flex:1,background:'var(--success-bg)',border:'1px solid #B2DFCC',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:700,color:'var(--success)'}}>{validRows.length}</div>
                <div style={{fontSize:11,color:'var(--success)'}}>Ready to insert</div>
              </div>
              <div style={{flex:1,background:'var(--danger-bg)',border:'1px solid #F5C6C2',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>

                <div style={{fontSize:11,color:'var(--danger)'}}>Will be skipped</div>
              </div>
            </div>
            <div style={{maxHeight:300,overflowY:'auto',border:'1px solid var(--border)',borderRadius:6}}>
              <table style={{fontSize:12}}>
                <thead><tr><th>#</th><th>Code</th><th>Name</th><th>Dept</th><th>Hire Date</th><th>Target Net</th><th>Issues</th></tr></thead>
                <tbody>
                  {parsed.rows.map(row=>{
                    const errs=validateEmpRow(row);
                    return <tr key={row._line} style={{background:errs.length?'#FFF8F8':''}}>
                      <td style={{color:'var(--ink-light)'}}>{row._line}</td>
                      <td style={{color:'var(--ink-light)'}}>{row.emp_code||<span style={{color:'var(--gold)'}}>auto</span>}</td>
                      <td style={{fontWeight:500}}>{row.full_name||<span style={{color:'var(--danger)'}}>—</span>}</td>
                      <td>{row.department||'—'}</td>
                      <td style={{color:/^\d{4}-\d{2}-\d{2}$/.test(row.hire_date)?'inherit':'var(--danger)'}}>{row.hire_date||'—'}</td>
                      <td style={{color:!isNaN(Number(row.target_net))&&row.target_net?'inherit':'var(--danger)'}}>{row.target_net||'—'}</td>
                      <td style={{color:'var(--danger)',fontSize:11}}>{errs.join('; ')||<span style={{color:'var(--success)'}}>✓</span>}</td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
            {invalidRows.length>0&&<div className="alert alert-info" style={{marginTop:10,marginBottom:0}}>{invalidRows.length} row(s) with errors will be skipped.</div>}
          </>}

          {step==='uploading'&&<div style={{textAlign:'center',padding:'32px 0'}}><div style={{fontSize:32,marginBottom:10}}>⏳</div><div style={{fontWeight:500}}>Inserting employees…</div></div>}

          {step==='done'&&results&&<div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:44,marginBottom:10}}>{results.inserted>0?'✅':'⚠️'}</div>

            {results.failed>0&&<div style={{color:'var(--danger)'}}>{results.failed} rows failed (database error)</div>}
            {results.skipped.length>0&&<div style={{color:'var(--ink-light)',fontSize:13}}>{results.skipped.length} row(s) skipped due to validation errors</div>}
          </div>}
        </div>
        <div className="modal-footer">
          {step==='idle'&&<button className="btn btn-secondary" onClick={onClose}>Close</button>}
          {step==='preview'&&<><button className="btn btn-secondary" onClick={()=>setStep('idle')}>← Back</button><button className="btn btn-primary" onClick={upload} disabled={validRows.length===0}>Insert {validRows.length} Employee(s)</button></>}
          {step==='done'&&<button className="btn btn-primary" onClick={onClose}>Done</button>}
        </div>
      </div>
    </div>
  );
}

// Assign IDs to existing employees who don't have one
async function assignMissingEmpCodes(employees) {
  const missing = employees.filter(e => !e.emp_code);
  if (!missing.length) return 0;
  const existing = employees.filter(e=>e.emp_code).map(e=>parseInt(e.emp_code.replace(/\D/g,''),10)).filter(n=>!isNaN(n));
  let counter = existing.length ? Math.max(...existing) : 0;
  for (const emp of missing) {
    const code = 'EMP-' + String(++counter).padStart(3,'0');
    await sb.from('employees').update({emp_code: code}).eq('id', emp.id);
  }
  return missing.length;
}

function EmployeesTab() {
  const [employees,setEmployees]=useState([]);
  const [loading,setLoading]=useState(true);

  const [saving,setSaving]=useState(false);
  const [search,setSearch]=useState('');
  const [form,setForm]=useState({...BLANK_EMP});
  const [showBulk,setShowBulk]=useState(false);
  const [assigning,setAssigning]=useState(false);

  const load = useCallback(async()=>{
    setLoading(true);
    const {data}=await sb.from('employees').select('*').order('emp_code',{nullsFirst:false}).order('full_name');
    setEmployees(data||[]);
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  const openAdd = ()=>{
    const code = nextEmpCode(employees);
    setForm({...BLANK_EMP, emp_code: code});
    setModal('add');
  };
  const openEdit=(emp)=>{setForm({...emp});setModal(emp);};
  const closeModal=()=>setModal(null);

  const save = async()=>{
    if(!form.full_name||!form.hire_date||!form.target_net){alert('Name, hire date, and target net are required.');return;}
    setSaving(true);
    if(modal==='add'){
      await sb.from('employees').insert({...form,target_net:Number(form.target_net)});
    } else {
      await sb.from('employees').update({...form,target_net:Number(form.target_net)}).eq('id',modal.id);
    }
    setSaving(false);setModal(null);load();
  };

  const toggle=async(emp)=>{
    await sb.from('employees').update({status:emp.status==='active'?'inactive':'active'}).eq('id',emp.id);
    load();
  };

  const doAssignCodes = async()=>{
    setAssigning(true);
    const n = await assignMissingEmpCodes(employees);
    setAssigning(false);
    if(n>0){alert(`${n} employee(s) assigned new IDs.`);load();}
    else alert('All employees already have IDs.');
  };

  const filtered=employees.filter(e=>
    e.full_name.toLowerCase().includes(search.toLowerCase())||
    (e.department||'').toLowerCase().includes(search.toLowerCase())||
    (e.emp_code||'').toLowerCase().includes(search.toLowerCase())

  const missingCodes=employees.filter(e=>!e.emp_code).length;

  return (<>
    {missingCodes>0&&<div className="alert alert-warn mb-24">
      {missingCodes} employee(s) are missing Employee IDs.{' '}

        {assigning?'Assigning…':'Auto-assign IDs now'}
      </button>
    </div>}

    <div className="stats">
      <div className="stat accent"><div className="stat-label">Total</div><div className="stat-value">{employees.length}</div></div>
      <div className="stat gold"><div className="stat-label">Active</div><div className="stat-value">{active}</div></div>
      <div className="stat"><div className="stat-label">Inactive</div><div className="stat-value">{employees.length-active}</div></div>
      <div className="stat"><div className="stat-label">Departments</div><div className="stat-value">{[...new Set(employees.map(e=>e.department).filter(Boolean))].length}</div></div>
    </div>

    <div className="card">
      <div className="card-header">
        <div className="card-title">Employee Directory</div>
        <div className="flex">
          <input placeholder="Search name, code, dept…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:200}} />
          <button className="btn btn-secondary" onClick={()=>setShowBulk(true)}>⬆⬇ Bulk / Export</button>
          <button className="btn btn-primary" onClick={openAdd}>+ Add Employee</button>
        </div>
      </div>
      <div className="tbl-wrap">
        {loading?<div className="empty"><div className="empty-text">Loading…</div></div>:
        filtered.length===0?<div className="empty"><div className="empty-icon">👤</div><div className="empty-text">No employees found.</div></div>:
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>National ID</th><th>Department</th><th>Job Title</th><th>Hire Date</th><th className="tbl-num">Target Net</th><th>Bank</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {filtered.map(emp=>(
              <tr key={emp.id}>
                <td><span style={{fontFamily:'monospace',fontWeight:600,color:'var(--maroon)',fontSize:12}}>{emp.emp_code||<span style={{color:'var(--ink-light)'}}>—</span>}</span></td>
                <td style={{fontWeight:500}}>{emp.full_name}</td>
                <td className="text-muted">{emp.national_id||'—'}</td>
                <td>{emp.department||'—'}</td>
                <td>{emp.job_title||'—'}</td>
                <td>{emp.hire_date}</td>
                <td className="tbl-num">{fmt(emp.target_net)}</td>
                <td style={{fontSize:12}}>{emp.bank_name||'—'}</td>
                <td><span className={`badge badge-${emp.status}`}>{emp.status}</span></td>

                    {emp.status==='active'?'Deactivate':'Activate'}
                  </button>
                </div></td>

            ))}
          </tbody>
        </table>}
      </div>
    </div>

    {showBulk&&<BulkModal onClose={()=>setShowBulk(false)} onDone={load} employees={employees} />}

  </>);
}

      sb.from('employees').select('id,full_name,emp_code,hire_date').eq('status','active').order('full_name'),
    ]);
    setBalances(b||[]);setEmployees(e||[]);setLoading(false);
  },[year]);

  useEffect(()=>{load();},[load]);

  const autoInit=async()=>{
    if(!confirm(`Auto-initialize ${year} leave balances for all active employees without one?`)) return;
    const existing=new Set(balances.map(b=>b.employee_id));
    const toCreate=employees.filter(e=>!existing.has(e.id)).map(e=>({
      employee_id:e.id,year,
      annual_entitlement:leaveEntitlement(e.hire_date,year),
      used_days:0,
      remaining_days:leaveEntitlement(e.hire_date,year),
      manual_override:false,
    }));
    if(!toCreate.length){alert('All employees already have balances for this year.');return;}
    await sb.from('leave_balances').insert(toCreate);
    alert(`${toCreate.length} balances created.`);
    load();
  };

  const save=async()=>{
    setSaving(true);
    const entitlement=Number(form.annual_entitlement);
    const used=Number(form.used_days||0);
    const payload={employee_id:form.employee_id,year:Number(form.year),annual_entitlement:entitlement,used_days:used,remaining_days:entitlement-used,manual_override:!!form.manual_override};
    if(modal==='add') await sb.from('leave_balances').insert(payload);
    else await sb.from('leave_balances').update(payload).eq('id',modal.id);
    setSaving(false);setModal(null);load();
  };

  const openAdd=(emp)=>{
    const entitlement=leaveEntitlement(emp.hire_date,year);
    setForm({employee_id:emp.id,year,annual_entitlement:entitlement,used_days:0,manual_override:false});
    setModal('add');
  };

  return (<>
    <div className="card mb-24">
      <div className="card-header">
        <div className="card-title">Leave Balances — {year}</div>
        <div className="flex">
          <button className="btn btn-secondary" onClick={autoInit}>⚡ Auto-Init All</button>
          <button className="btn btn-primary" onClick={()=>{setForm({employee_id:'',year,annual_entitlement:21,used_days:0,manual_override:false});setModal('add');}}>+ Add Balance</button>
        </div>
      </div>
      <div className="tbl-wrap">
        {loading?<div className="empty"><div className="empty-text">Loading…</div></div>:
        balances.length===0?<div className="empty"><div className="empty-icon">🏖️</div><div className="empty-text">No leave balances for {year}. Click "Auto-Init All" to create them.</div></div>:
        <table>
          <thead><tr><th>Employee</th><th>Hire Date</th><th className="tbl-num">Entitlement</th><th className="tbl-num">Used</th><th className="tbl-num">Remaining</th><th>Override</th><th></th></tr></thead>
          <tbody>
            {balances.map(b=>(
              <tr key={b.id}>
                <td style={{fontWeight:500}}>{b.employees?.full_name}<br/><span style={{fontSize:11,color:'var(--ink-light)'}}>{b.employees?.emp_code}</span></td>
                <td className="text-muted">{b.employees?.hire_date}</td>
                <td className="tbl-num">{b.annual_entitlement} days</td>
                <td className="tbl-num">{b.used_days} days</td>
                <td className="tbl-num" style={{fontWeight:700,color:b.remaining_days>0?'var(--success)':'var(--danger)'}}>{b.remaining_days} days</td>
                <td><span className="text-muted" style={{fontSize:12}}>{b.manual_override?'Manual':'Auto'}</span></td>
                <td><button className="btn btn-secondary btn-sm" onClick={()=>{setForm({...b});setModal(b);}}>Edit</button></td>
              </tr>
            ))}
          </tbody>
        </table>}
      </div>
    </div>

    <div className="card">
      <div className="card-header"><div className="card-title">Employees Without {year} Balance</div></div>
      <div className="tbl-wrap">
        {employees.filter(e=>!balances.find(b=>b.employee_id===e.id)).length===0
          ?<div className="empty"><div className="empty-text">All employees have balances for {year}. ✓</div></div>
          :<table>
            <thead><tr><th>Employee</th><th>Hire Date</th><th className="tbl-num">Auto Entitlement</th><th></th></tr></thead>
            <tbody>
              {employees.filter(e=>!balances.find(b=>b.employee_id===e.id)).map(e=>(
                <tr key={e.id}>
                  <td style={{fontWeight:500}}>{e.full_name} <span style={{fontSize:11,color:'var(--ink-light)'}}>{e.emp_code}</span></td>
                  <td>{e.hire_date}</td>
                  <td className="tbl-num">{leaveEntitlement(e.hire_date,year)} days</td>
                  <td><button className="btn btn-secondary btn-sm" onClick={()=>openAdd(e)}>Add Balance</button></td>
                </tr>
              ))}
            </tbody>
          </table>}
      </div>
    </div>

    {modal&&<Modal title={modal==='add'?'Add Leave Balance':'Edit Leave Balance'} onClose={()=>setModal(null)}
      footer={<><button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-primary" onClick={save} disabled={saving}>{saving?<><span className="spinner"></span> Saving…</>:'Save'}</button></>}>
      <div className="form-grid">
        <div className="form-group">
          <label>Employee</label>
          <select value={form.employee_id||''} onChange={e=>setForm(p=>({...p,employee_id:e.target.value}))} disabled={modal!=='add'}>
            <option value="">Select…</option>
            {employees.map(e=><option key={e.id} value={e.id}>{e.emp_code} — {e.full_name}</option>)}
          </select>
        </div>
        <Field label="Year" field="year" type="number" form={form} setForm={setForm} />
        <Field label="Annual Entitlement (days)" field="annual_entitlement" type="number" form={form} setForm={setForm} />
        <Field label="Used Days (so far)" field="used_days" type="number" form={form} setForm={setForm} />
        <div className="form-group full">
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <input type="checkbox" style={{width:'auto'}} checked={!!form.manual_override} onChange={e=>setForm(p=>({...p,manual_override:e.target.checked}))} />
            Manual override (don't auto-recalculate entitlement)
          </label>
        </div>
      </div>
      <div className="alert alert-info" style={{marginTop:12,marginBottom:0}}>
        Remaining = Entitlement − Used = <strong>{(Number(form.annual_entitlement||0)-Number(form.used_days||0))} days</strong>
      </div>
    </Modal>}
  </>);
}

function AdjPanel({ emp, adj, onChange, loans, penaltyTypes, leaveBal }) {
  const gross   = grossUp(emp.target_net);
  const hourly  = gross / 26 / 8;
  const daily   = gross / 30;
  const otRate  = hourly * 1.35;

  const u = (field, val) => onChange({ ...adj, [field]: val });

  return (
    <div className="adj-panel">
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12 }}>

        {/* OT */}
        <div className="adj-section">
          <div className="section-title">Overtime</div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Hours</label>
            <input type="number" min="0" value={adj.ot_hours||''} onChange={e=>u('ot_hours',e.target.value)} placeholder="0" />
          </div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Rate (EGP/hr) — default 1.35×</label>
            <input type="number" min="0" value={adj.ot_rate_custom||''} onChange={e=>u('ot_rate_custom',e.target.value)} placeholder={otRate.toFixed(2)} />
          </div>
          <div style={{fontSize:12,color:'var(--success)',fontWeight:600}}>
            Value: EGP {fmt((Number(adj.ot_hours||0)) * (adj.ot_rate_custom?Number(adj.ot_rate_custom):otRate))}
          </div>
        </div>

        {/* Lateness */}
        <div className="adj-section">
          <div className="section-title">Lateness</div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Days</label>
            <input type="number" min="0" value={adj.late_days||''} onChange={e=>u('late_days',e.target.value)} placeholder="0" />
          </div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Hours</label>
            <input type="number" min="0" value={adj.late_hours||''} onChange={e=>u('late_hours',e.target.value)} placeholder="0" />
          </div>
          <div style={{fontSize:12,color:'var(--danger)',fontWeight:600}}>
            Deduct: EGP {fmt(Number(adj.late_days||0)*daily + Number(adj.late_hours||0)*hourly)}
          </div>
        </div>

        {/* Leave */}
        <div className="adj-section">
          <div className="section-title">Leave</div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Days taken</label>
            <input type="number" min="0" value={adj.leave_days||''} onChange={e=>u('leave_days',e.target.value)} placeholder="0" />
          </div>
          {leaveBal!=null&&<div style={{fontSize:12,marginBottom:4}}>
            Balance: <strong style={{color:leaveBal.remaining_days>0?'var(--success)':'var(--danger)'}}>{leaveBal.remaining_days} days</strong>
          </div>}
          {Number(adj.leave_days||0)>0&&leaveBal!=null&&(()=>{
            const d=Number(adj.leave_days);
            const covered=Math.min(leaveBal.remaining_days,d);
            const fromSal=d-covered;
            return <div style={{fontSize:12,color:'var(--ink-light)'}}>
              {covered>0&&<div style={{color:'var(--success)'}}>{covered}d from balance ✓</div>}
              {fromSal>0&&<div style={{color:'var(--danger)'}}>{fromSal}d deducted: EGP {fmt(fromSal*daily)}</div>}
            </div>;
          })()}
        </div>

        {/* Incentive */}
        <div className="adj-section">
          <div className="section-title">Incentive</div>
          <div className="form-group">
            <label>Amount (EGP)</label>
            <input type="number" min="0" value={adj.incentive||''} onChange={e=>u('incentive',e.target.value)} placeholder="0" />
          </div>
        </div>

        {/* Variable Allowance */}
        <div className="adj-section">
          <div className="section-title">Variable Allowance</div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Amount (EGP)</label>
            <input type="number" min="0" value={adj.variable_allowance||''} onChange={e=>u('variable_allowance',e.target.value)} placeholder="0" />
          </div>
          <div className="form-group">
            <label>Note</label>
            <input value={adj.variable_allowance_note||''} onChange={e=>u('variable_allowance_note',e.target.value)} placeholder="Note" />
          </div>
        </div>

        {/* Penalty */}
        <div className="adj-section">
          <div className="section-title">Penalty</div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Type</label>
            <select value={adj.penalty_type_id||''} onChange={e=>{
              const t=penaltyTypes.find(p=>p.id===e.target.value);
              u('penalty_type_id',e.target.value);
              if(t?.default_amount) onChange({...adj,penalty_type_id:e.target.value,penalty_amount:t.default_amount,penalty_reason:t.name});
            }}>
              <option value="">Select type…</option>
              {penaltyTypes.map(p=><option key={p.id} value={p.id}>{p.name}{p.default_amount?` (EGP ${fmt(p.default_amount)})`:''}</option>)}
            </select>
          </div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Amount (EGP)</label>
            <input type="number" min="0" value={adj.penalty_amount||''} onChange={e=>u('penalty_amount',e.target.value)} placeholder="0" />
          </div>
        </div>

        {/* Loan */}
        <div className="adj-section">
          <div className="section-title">Loan Deduction</div>
          {loans.length===0
            ?<div style={{fontSize:12,color:'var(--ink-light)'}}>No active loans</div>
            :<><div className="form-group" style={{marginBottom:6}}>
              <label>Loan</label>
              <select value={adj.loan_id||''} onChange={e=>{
                const l=loans.find(x=>x.id===e.target.value);
                onChange({...adj,loan_id:e.target.value,loan_deduction:l?l.monthly_deduction:''});
              }}>
                <option value="">None</option>
                {loans.map(l=><option key={l.id} value={l.id}>{l.reason||'Loan'} — Rem: EGP {fmt(l.remaining_balance)}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Deduction Amount (EGP)</label>
              <input type="number" min="0" value={adj.loan_deduction||''} onChange={e=>u('loan_deduction',e.target.value)} placeholder="0" />
            </div></>}
        </div>

        {/* Advance */}
        <div className="adj-section">
          <div className="section-title">Advance</div>
          <div className="form-group">
            <label>Amount (EGP)</label>
            <input type="number" min="0" value={adj.advance||''} onChange={e=>u('advance',e.target.value)} placeholder="0" />
          </div>
        </div>

      </div>
    </div>
  );
}

function RunPayrollTab({ onRunCreated }) {
  const [month,setMonth]=useState(today().slice(0,7));
  const [closing,setClosing]=useState(today());
  const [employees,setEmployees]=useState([]);
  const [loans,setLoans]=useState([]);
  const [leaveBalances,setLeaveBalances]=useState([]);
  const [fixedAllowances,setFixedAllowances]=useState([]);
  const [penaltyTypes,setPenaltyTypes]=useState([]);
  const [adjs,setAdjs]=useState({});
  const [expandedEmp,setExpandedEmp]=useState(null);
  const [preview,setPreview]=useState(null);
  const [calculating,setCalculating]=useState(false);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);

  const calculate=async()=>{
    setCalculating(true);setMsg(null);setPreview(null);
    const year=new Date(closing).getFullYear();
    const [{data:emps},{data:ls},{data:lbs},{data:fa},{data:pt}]=await Promise.all([
      sb.from('employees').select('*').eq('status','active'),
      sb.from('loans').select('*').eq('status','active'),
      sb.from('leave_balances').select('*').eq('year',year),
      sb.from('allowances').select('*').eq('active',true).eq('type','fixed'),
      sb.from('penalty_types').select('*').order('name'),
    ]);
    if(!emps||emps.length===0){setMsg({type:'danger',text:'No active employees.'});setCalculating(false);return;}
    setEmployees(emps);setLoans(ls||[]);setLeaveBalances(lbs||[]);setFixedAllowances(fa||[]);setPenaltyTypes(pt||[]);
    // init adjs from active loans
    const initAdjs={};
    emps.forEach(emp=>{
      const empLoans=(ls||[]).filter(l=>l.employee_id===emp.id);
      const firstLoan=empLoans[0];
      initAdjs[emp.id]={
        ...(adjs[emp.id]||{}),
        loan_id:firstLoan?.id||'',
        loan_deduction:firstLoan?.monthly_deduction||'',
      };
    });
    setAdjs(p=>({...initAdjs,...p}));
    const lines=emps.map(emp=>{
      const empAdj=initAdjs[emp.id]||{};
      const empAllowances=(fa||[]).filter(a=>a.employee_id===emp.id);
      const leaveBal=(lbs||[]).find(b=>b.employee_id===emp.id)||null;
      return calcEmployee(emp,closing,empAdj,empAllowances,leaveBal);
    });
    setPreview(lines);setCalculating(false);
  };

  const recalcLine=(empId)=>{
    if(!preview) return;
    const emp=employees.find(e=>e.id===empId);
    const empAdj=adjs[empId]||{};
    const empAllowances=fixedAllowances.filter(a=>a.employee_id===empId);
    const leaveBal=leaveBalances.find(b=>b.employee_id===empId)||null;
    const newLine=calcEmployee(emp,closing,empAdj,empAllowances,leaveBal);
    setPreview(p=>p.map(l=>l.employee_id===empId?newLine:l));
  };

  const updateAdj=(empId,newAdj)=>{
    setAdjs(p=>({...p,[empId]:newAdj}));
    // debounce recalc
    setTimeout(()=>recalcLine(empId),50);
  };

  const finalize=async()=>{
    if(!preview) return;
    setSaving(true);
    const {data:run,error}=await sb.from('payroll_runs').insert({month,closing_date:closing,status:'draft'}).select().single();
    if(error){setMsg({type:'danger',text:'Failed: '+error.message});setSaving(false);return;}

    const inserts=preview.map(l=>({
      run_id:run.id, employee_id:l.employee_id,
      pro_rata_factor:l.pro_rata_factor,
      gross_full:l.gross_full, si_base:l.si_base, emp_si:l.emp_si, er_si:l.er_si,
      annual_taxable:l.annual_taxable, monthly_tax:l.monthly_tax,
      fixed_allowances:l.fixed_allowances, variable_allowance:l.variable_allowance,
      incentive:l.incentive, ot_hours:l.ot_hours, ot_rate:l.ot_rate, ot_value:l.ot_value,
      late_days:l.late_days, late_hours:l.late_hours, late_value:l.late_value,
      leave_days:l.leave_days, leave_from_balance:l.leave_from_balance,
      leave_from_salary:l.leave_from_salary, leave_deduction:l.leave_deduction,
      penalty:l.penalty, penalty_reason:l.penalty_reason,
      loan_deduction:l.loan_deduction, advance:l.advance,
      total_earnings:l.total_earnings, total_deductions:l.total_deductions,
      net_full:l.net_full,
      dispensed_gross:l.dispensed_gross, dispensed_allowances:l.dispensed_allowances,
      dispensed_ot:l.dispensed_ot, dispensed_emp_si:l.dispensed_emp_si,
      dispensed_tax:l.dispensed_tax, dispensed_late:l.dispensed_late,
      dispensed_leave_ded:l.dispensed_leave_ded, dispensed_penalty:l.dispensed_penalty,
      dispensed_loan:l.dispensed_loan, dispensed_advance:l.dispensed_advance,
      dispensed_total_earn:l.dispensed_total_earn, dispensed_total_ded:l.dispensed_total_ded,
      dispensed_net:l.dispensed_net, dispensed_er_si:l.dispensed_er_si,
      total_employer_cost:l.total_employer_cost,
    }));
    await sb.from('payroll_lines').insert(inserts);

    // update leave balances
    for (const l of preview) {
      if (l.leave_from_balance > 0) {
        const bal = leaveBalances.find(b=>b.employee_id===l.employee_id);
        if (bal) {
          const newUsed = bal.used_days + l.leave_from_balance;
          const newRem  = bal.annual_entitlement - newUsed;
          await sb.from('leave_balances').update({used_days:newUsed,remaining_days:newRem}).eq('id',bal.id);
        }
      }
      // update loan remaining balance
      if (l.loan_deduction > 0 && adjs[l.employee_id]?.loan_id) {
        const loan = loans.find(ln=>ln.id===adjs[l.employee_id].loan_id);
        if (loan) {
          const newRem = Math.max(0, loan.remaining_balance - l.loan_deduction);
          const newStatus = newRem <= 0 ? 'settled' : 'active';
          await sb.from('loans').update({remaining_balance:newRem,status:newStatus}).eq('id',loan.id);
        }
      }
    }

    await sb.from('payroll_runs').update({status:'finalized'}).eq('id',run.id);
    setMsg({type:'success',text:'Payroll finalized and saved.'});
    setPreview(null);setSaving(false);
    if(onRunCreated) onRunCreated();
  };

  const totals=useMemo(()=>preview?{
    earn: preview.reduce((s,l)=>s+l.dispensed_total_earn,0),
    ded:  preview.reduce((s,l)=>s+l.dispensed_total_ded,0),
    net:  preview.reduce((s,l)=>s+l.dispensed_net,0),
    cost: preview.reduce((s,l)=>s+l.total_employer_cost,0),
  }:null,[preview]);

  return (<>
    {msg&&<div className={`alert alert-${msg.type}`}>{msg.text}</div>}
    <div className="card mb-24">
      <div className="card-header"><div className="card-title">Payroll Parameters</div></div>
      <div className="card-body">
        <div className="form-grid-3">
          <div className="form-group"><label>Payroll Month</label><input type="month" value={month} onChange={e=>setMonth(e.target.value)} /></div>
          <div className="form-group"><label>Month Closing Date</label><input type="date" value={closing} onChange={e=>setClosing(e.target.value)} /></div>
          <div className="form-group" style={{justifyContent:'flex-end'}}><label>&nbsp;</label>
            <button className="btn btn-primary" onClick={calculate} disabled={calculating}>{calculating?<><span className="spinner"></span> Calculating…</>:'⚡ Calculate Payroll'}</button>
          </div>
        </div>
      </div>
    </div>

    {preview&&<>
      <div className="stats mb-24">
        <div className="stat accent"><div className="stat-label">Employees</div><div className="stat-value">{preview.length}</div></div>
        <div className="stat gold"><div className="stat-label">Dispensed Net</div><div className="stat-value" style={{fontSize:16}}>EGP {fmt(totals.net)}</div></div>
        <div className="stat"><div className="stat-label">Total Earnings</div><div className="stat-value" style={{fontSize:16}}>EGP {fmt(totals.earn)}</div></div>
        <div className="stat"><div className="stat-label">Employer Cost</div><div className="stat-value" style={{fontSize:16}}>EGP {fmt(totals.cost)}</div></div>
      </div>

      <div className="card mb-24">
        <div className="card-header">
          <div className="card-title">Payroll Preview — {mLabel(month)}</div>
          <div className="flex">
            <div className="alert alert-info" style={{margin:0,padding:'5px 10px',fontSize:12}}>Expand each employee to adjust OT, leave, penalties…</div>
            <button className="btn btn-gold" onClick={finalize} disabled={saving}>{saving?<><span className="spinner"></span> Saving…</>:'✔ Finalize & Save'}</button>
          </div>
        </div>
        <div className="tbl-wrap">
          <table>
            <thead><tr>
              <th>Employee</th><th>Pro-Rata</th>
              <th className="tbl-num">Gross</th>
              <th className="tbl-num">Allow+OT</th>
              <th className="tbl-num">SI+Tax</th>
              <th className="tbl-num">Deductions</th>
              <th className="tbl-num" style={{color:'var(--success)'}}>Dispensed Net ★</th>
              <th></th>
            </tr></thead>
            <tbody>
              {preview.map(l=>{
                const emp=employees.find(e=>e.id===l.employee_id);
                const empLoans=loans.filter(ln=>ln.employee_id===l.employee_id&&ln.status==='active');
                const leaveBal=leaveBalances.find(b=>b.employee_id===l.employee_id)||null;
                const isExpanded=expandedEmp===l.employee_id;
                return [
                  <tr key={l.employee_id} style={{background:isExpanded?'var(--maroon-faint)':''}}>
                    <td>
                      <div style={{fontWeight:600}}>{l.name}</div>
                      <div style={{fontSize:11,color:'var(--ink-light)'}}>{l.emp_code} · {l.department}</div>
                    </td>
                    <td>{l.pro_rata_factor<1?<span className="pro-rata-badge">{fmtPct(l.pro_rata_factor)}</span>:<span className="text-muted" style={{fontSize:12}}>Full</span>}</td>
                    <td className="tbl-num">{fmt(l.dispensed_gross)}</td>
                    <td className="tbl-num" style={{color:l.dispensed_allowances+l.dispensed_ot>0?'var(--success)':'var(--ink-light)'}}>
                      {fmt(l.dispensed_allowances+l.dispensed_ot)}
                    </td>
                    <td className="tbl-num text-danger">{fmt(l.dispensed_emp_si+l.dispensed_tax)}</td>
                    <td className="tbl-num text-danger">{fmt(l.dispensed_total_ded)}</td>
                    <td className="tbl-num text-success">{fmt(l.dispensed_net)}</td>
                    <td>
                      <button className="btn btn-secondary btn-sm" onClick={()=>setExpandedEmp(isExpanded?null:l.employee_id)}>
                        {isExpanded?'▲ Close':'▼ Adjust'}
                      </button>
                    </td>
                  </tr>,
                  isExpanded&&<tr key={l.employee_id+'-adj'}>
                    <td colSpan={8} style={{padding:'0 12px 12px'}}>
                      <AdjPanel emp={emp} adj={adjs[l.employee_id]||{}} onChange={a=>updateAdj(l.employee_id,a)}
                        loans={empLoans} penaltyTypes={penaltyTypes} leaveBal={leaveBal} />
                    </td>
                  </tr>
                ];
              })}
            </tbody>
            <tfoot>
              <tr className="tbl-total">
                <td colSpan={2}>TOTALS</td>
                <td className="tbl-num">{fmt(preview.reduce((s,l)=>s+l.dispensed_gross,0))}</td>
                <td className="tbl-num">{fmt(preview.reduce((s,l)=>s+l.dispensed_allowances+l.dispensed_ot,0))}</td>
                <td className="tbl-num">{fmt(preview.reduce((s,l)=>s+l.dispensed_emp_si+l.dispensed_tax,0))}</td>
                <td className="tbl-num">{fmt(totals.ded)}</td>
                <td className="tbl-num">{fmt(totals.net)}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </>}
  </>);
}

    const rows=lines.map(l=>[

      l.dispensed_total_earn,l.dispensed_total_ded,l.dispensed_net,

      <div className="stat gold"><div className="stat-label">Dispensed Net</div><div className="stat-value" style={{fontSize:15}}>EGP {fmt(totals.net)}</div></div>

            {(line.dispensed_loan||0)>0&&<div className="ps-line"><span>Loan Deduction</span><span style={{color:'var(--danger)'}}>− EGP {fmt(line.dispensed_loan)}</span></div>}
            {(line.dispensed_advance||0)>0&&<div className="ps-line"><span>Advance</span><span style={{color:'var(--danger)'}}>− EGP {fmt(line.dispensed_advance)}</span></div>}
            <div className="ps-line" style={{fontWeight:600}}><span>Total Deductions</span><span style={{color:'var(--danger)'}}>− EGP {fmt(line.dispensed_total_ded)}</span></div>
          </div>

          <div className="ps-total">
            <div style={{fontWeight:500}}>Net Salary to Dispense</div>
            <div style={{fontSize:20,fontWeight:700}}>EGP {fmt(line.dispensed_net)}</div>
          </div>

          {line.leave_days>0&&<div className="ps-leave">
            Leave: {line.leave_days} day(s) taken · {line.leave_from_balance>0?`${line.leave_from_balance}d from balance`:''}{line.leave_from_salary>0?` · ${line.leave_from_salary}d deducted from salary`:''}
            {line.leave_bal_after!=null&&` · Remaining balance: ${line.leave_bal_after} days`}
          </div>}

          <div className="ps-employer">
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--ink-light)',marginBottom:8}}>Employer Cost (Confidential)</div>
            <div className="ps-line" style={{borderBottom:'1px solid #E8E8E8'}}><span>Gross Salary</span><span>EGP {fmt(line.dispensed_gross)}</span></div>
            <div className="ps-line" style={{borderBottom:'1px solid #E8E8E8'}}><span>Employer SI (18.75%)</span><span>EGP {fmt(line.dispensed_er_si)}</span></div>
            <div className="ps-line" style={{fontWeight:700}}><span>Total Employer Cost</span><span>EGP {fmt(line.total_employer_cost)}</span></div>
          </div>
        </div>
        <div className="payslip-footer">
          <span>Generated: {new Date().toLocaleDateString('en-EG')}</span>
          <span>CONFIDENTIAL — Eterna Developments</span>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState('employees');
  const [historyView,setHistoryView]=useState(null);
  const [payslipData,setPayslipData]=useState(null);

  const nav=[
    {id:'employees',icon:'👥',label:'Employees'},
    {id:'loans',    icon:'💳',label:'Loans'},
    {id:'leave',    icon:'🏖️',label:'Leave'},
    {id:'allowances',icon:'💰',label:'Allowances'},
    {id:'penalties',icon:'⚠️',label:'Penalty Types'},
    {id:'run',      icon:'⚡',label:'Run Payroll'},
    {id:'history',  icon:'📋',label:'History'},
  ];

  const topTitle={
    employees:'Employees',loans:'Loans',leave:'Leave Balances',
    allowances:'Allowances',penalties:'Penalty Types',
    run:'Run Payroll',
    history: payslipData?'Payslip':historyView?'Payroll Register':'History'
  };

  const renderContent=()=>{
    if(payslipData) return <PayslipView data={payslipData} onBack={()=>setPayslipData(null)} />;
    if(tab==='employees') return <EmployeesTab />;
    if(tab==='loans')     return <LoansTab />;
    if(tab==='leave')     return <LeaveTab />;
    if(tab==='allowances')return <AllowancesTab />;
    if(tab==='penalties') return <PenaltyTypesTab />;
    if(tab==='run')       return <RunPayrollTab onRunCreated={()=>{}} />;
    if(tab==='history') {
      if(historyView) return <RegisterView run={historyView} onBack={()=>{setHistoryView(null);setPayslipData(null);}} onViewPayslip={d=>{setPayslipData(d);}} />;
      return <HistoryTab onViewRun={r=>setHistoryView(r)} />;
    }
  };

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="co">ETERNA</div>
          <div className="sub">Payroll System</div>
        </div>
        <div className="nav">
          {nav.map(n=>(
            <div key={n.id} className={`nav-item${tab===n.id?' active':''}`}
              onClick={()=>{setTab(n.id);setHistoryView(null);setPayslipData(null);}}>
              <span className="nav-icon">{n.icon}</span><span>{n.label}</span>
            </div>
          ))}
        </div>
        <div className="sidebar-footer">Law 14/2025 · NOSI Jan 2026<br/>Law 7/2024 Income Tax</div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{topTitle[tab]}</div>
          <div className="topbar-badge">Eterna Developments</div>
        </div>
        <div className="content">{renderContent()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
