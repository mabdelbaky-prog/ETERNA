<script type="text/babel">
const { createClient } = supabase;
const { useState, useEffect, useCallback, useRef } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://ejxybzhrklqecbozftij.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqeHliemhya2xxZWNib3pmdGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDg4NzUsImV4cCI6MjA5ODIyNDg3NX0.pYxfzQk9OInvfrwObue68dxKJibmjQlhCxNxg5JOROw';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── PAYROLL ENGINE ────────────────────────────────────────────────────────────
const EMP_SI_RATE   = 0.11;
const EMP_SI_RATE_ER= 0.1875;
const SI_MIN        = 2700;
const SI_MAX        = 16700;
const PERSONAL_EX   = 20000;
const BRACKETS = [
  { limit: 40000,  rate: 0.00 },
  { limit: 55000,  rate: 0.10 },
  { limit: 70000,  rate: 0.15 },
  { limit: 200000, rate: 0.20 },
  { limit: 400000, rate: 0.225},
  { limit: Infinity,rate:0.275},
];

function calcTax(annualTaxable) {
  if (annualTaxable <= 0) return 0;
  let tax = 0, prev = 0;
  for (const b of BRACKETS) {
    if (annualTaxable <= prev) break;
    const slice = Math.min(annualTaxable, b.limit) - prev;
    tax += slice * b.rate;
    prev = b.limit;
    if (b.limit === Infinity) break;
  }
  return tax;
}

function annualNetFromGross(annualGross) {
  const siBase   = Math.min(Math.max(annualGross / 12, SI_MIN), SI_MAX);
  const empSiAnn = siBase * EMP_SI_RATE * 12;
  const taxable  = Math.max(annualGross - empSiAnn - PERSONAL_EX, 0);
  const tax      = calcTax(taxable);
  return annualGross - empSiAnn - tax;
}

function grossUp(targetNetMonthly) {
  const target = targetNetMonthly * 12;
  let lo = target, hi = target * 3;
  for (let i = 0; i < 60; i++) {
    const mid = (lo + hi) / 2;
    annualNetFromGross(mid) < target ? lo = mid : hi = mid;
  }
  return (lo + hi) / 2 / 12;
}

function proRata(hireDate, closingDate) {
  const closing  = new Date(closingDate);
  const hire     = new Date(hireDate);
  const monthStart = new Date(closing.getFullYear(), closing.getMonth(), 1);
  if (hire <= monthStart) return 1;
  const daysInMonth = new Date(closing.getFullYear(), closing.getMonth() + 1, 0).getDate();
  const worked = Math.max(0, (closing - hire) / 86400000 + 1);
  return Math.min(1, worked / daysInMonth);
}

function calcEmployee(emp, closingDate) {
  const factor     = proRata(emp.hire_date, closingDate);
  const grossFull  = grossUp(emp.target_net);
  const siBase     = Math.min(Math.max(grossFull, SI_MIN), SI_MAX);
  const empSi      = siBase * EMP_SI_RATE;
  const annGross   = grossFull * 12;
  const annEmpSi   = siBase * EMP_SI_RATE * 12;
  const annTaxable = Math.max(annGross - annEmpSi - PERSONAL_EX, 0);
  const monthlyTax = calcTax(annTaxable) / 12;
  const totalDed   = empSi + monthlyTax;
  const netFull    = grossFull - totalDed;
  const erSi       = siBase * EMP_SI_RATE_ER;
  return {
    employee_id:     emp.id,
    name:            emp.full_name,
    department:      emp.department,
    job_title:       emp.job_title,
    hire_date:       emp.hire_date,
    target_net:      emp.target_net,
    pro_rata_factor: factor,
    gross_full:      grossFull,
    si_base:         siBase,
    emp_si:          empSi,
    annual_taxable:  annTaxable,
    monthly_tax:     monthlyTax,
    total_deductions:totalDed,
    net_full:        netFull,
    employer_si:     erSi,
    // Dispensed (pro-rated)
    dispensed_gross: grossFull * factor,
    dispensed_emp_si:empSi * factor,
    dispensed_tax:   monthlyTax * factor,
    dispensed_deductions: totalDed * factor,
    dispensed_net:   netFull * factor,
    dispensed_er_si: erSi * factor,
    total_employer_cost: (grossFull + erSi) * factor,
  };
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = (n) => n == null ? '—' : Number(n).toLocaleString('en-EG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtPct = (n) => (n * 100).toFixed(1) + '%';
const today = () => new Date().toISOString().slice(0, 10);
const monthLabel = (s) => { if (!s) return ''; const d = new Date(s + '-01'); return d.toLocaleString('en', { month: 'long', year: 'numeric' }); };

// ── SETUP CHECK ───────────────────────────────────────────────────────────────
const isConfigured = true;

// ── COMPONENTS ────────────────────────────────────────────────────────────────

function SetupScreen() {

        </div>
        <pre style={{ background:'var(--bg)', borderRadius:6, padding:16, textAlign:'left', fontSize:11, overflow:'auto', border:'1px solid var(--border)' }}>{`CREATE TABLE employees (

  dispensed_emp_si numeric,
  dispensed_tax numeric,
  dispensed_deductions numeric,
  dispensed_net numeric,
  dispensed_er_si numeric,
  total_employer_cost numeric
);`}</pre>
      </div>

}

const SAMPLE_CSV_HEADERS = ['full_name','national_id','department','job_title','hire_date','target_net','status','bank_name','account_number'];
const SAMPLE_ROWS = [
  ['Ahmed Hassan','29901011234567','Operations','Operations Manager','2023-03-01','12000','active','Banque Misr','1234567890123456'],

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { error: 'File is empty or has no data rows.' };
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  const required = ['full_name','hire_date','target_net'];
  for (const r of required) {
    if (!headers.includes(r)) return { error: `Missing required column: "${r}"` };
  }
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    // Simple CSV split (handles quoted fields)
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx] || '').replace(/^"|"$/g,'').trim(); });
    rows.push({ _line: i + 1, ...obj });
  }
  return { headers, rows };
}

function validateRow(row) {
  const errors = [];
  if (!row.full_name) errors.push('full_name is required');
  if (!row.hire_date || !/^\d{4}-\d{2}-\d{2}$/.test(row.hire_date)) errors.push('hire_date must be YYYY-MM-DD');
  if (!row.target_net || isNaN(Number(row.target_net)) || Number(row.target_net) <= 0) errors.push('target_net must be a positive number');
  if (row.status && !['active','inactive'].includes(row.status)) errors.push('status must be active or inactive');
  return errors;
}

function BulkModal({ onClose, onDone, employees }) {
  const [step, setStep] = useState('idle'); // idle | preview | uploading | done
  const [parsed, setParsed] = useState(null);
  const [results, setResults] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);

  const handleFile = (file) => {
    if (!file || !file.name.endsWith('.csv')) { alert('Please upload a .csv file.'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const result = parseCSV(e.target.result);
      if (result.error) { alert(result.error); return; }
      setParsed(result);
      setStep('preview');
    };
    reader.readAsText(file);
  };

  const upload = async () => {
    setStep('uploading');
    const valid = [], invalid = [];
    for (const row of parsed.rows) {
      const errors = validateRow(row);
      if (errors.length) { invalid.push({ row, errors }); continue; }
      valid.push({
        full_name:  row.full_name,
        national_id: row.national_id || null,
        department: row.department || null,
        job_title:  row.job_title || null,
        hire_date:  row.hire_date,
        target_net: Number(row.target_net),
        status:     row.status || 'active',
        bank_name:  row.bank_name || null,
        account_number: row.account_number || null,
      });
    }
    let inserted = 0, failed = 0;
    if (valid.length) {
      const { error } = await sb.from('employees').insert(valid);
      if (error) { failed = valid.length; }
      else { inserted = valid.length; }
    }
    setResults({ inserted, skipped: invalid, failed });
    setStep('done');
    if (inserted > 0 && onDone) onDone();
  };

  const validRows  = parsed ? parsed.rows.filter(r => validateRow(r).length === 0) : [];
  const invalidRows= parsed ? parsed.rows.filter(r => validateRow(r).length > 0)  : [];

  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 680 }}>
        <div className="modal-header">
          <div className="modal-title">
            {step === 'idle' && 'Bulk Upload / Download'}
            {step === 'preview' && `Preview — ${parsed.rows.length} rows found`}
            {step === 'uploading' && 'Uploading…'}
            {step === 'done' && 'Upload Complete'}
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">

          {/* ── IDLE ── */}
          {step === 'idle' && (<>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:24 }}>
              <div style={{ border:'1px solid var(--border)', borderRadius:8, padding:20, textAlign:'center' }}>
                <div style={{ fontSize:28, marginBottom:8 }}>⬇</div>
                <div style={{ fontWeight:600, marginBottom:6 }}>Download Sample CSV</div>
                <div style={{ color:'var(--ink-light)', fontSize:12, marginBottom:14 }}>Get the template with correct column headers and 3 example rows</div>
                <button className="btn btn-secondary" onClick={downloadSampleCSV}>Download Sample</button>
              </div>
              <div style={{ border:'1px solid var(--border)', borderRadius:8, padding:20, textAlign:'center' }}>
                <div style={{ fontSize:28, marginBottom:8 }}>📤</div>
                <div style={{ fontWeight:600, marginBottom:6 }}>Export All Employees</div>
                <div style={{ color:'var(--ink-light)', fontSize:12, marginBottom:14 }}>Download all {employees.length} employees as CSV</div>
                <button className="btn btn-secondary" onClick={() => downloadAllEmployees(employees)} disabled={employees.length === 0}>Export All ({employees.length})</button>
              </div>
            </div>

            <div style={{ borderTop:'1px solid var(--border)', paddingTop:20 }}>
              <div style={{ fontWeight:600, marginBottom:12 }}>Upload Employees CSV</div>
              <div
                style={{ border:`2px dashed ${dragOver ? 'var(--maroon)' : 'var(--border)'}`, borderRadius:8, padding:36, textAlign:'center', background: dragOver ? 'var(--maroon-faint)' : 'var(--bg)', cursor:'pointer', transition:'all .15s' }}
                onClick={() => fileRef.current.click()}
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
              >
                <div style={{ fontSize:32, marginBottom:8 }}>📂</div>
                <div style={{ fontWeight:500, marginBottom:4 }}>Drop CSV here or click to browse</div>
                <div style={{ fontSize:12, color:'var(--ink-light)' }}>CSV files only · Use the sample template for correct format</div>
                <input ref={fileRef} type="file" accept=".csv" style={{ display:'none' }} onChange={e => handleFile(e.target.files[0])} />
              </div>
              <div style={{ marginTop:12, fontSize:12, color:'var(--ink-light)' }}>
                Required columns: <code>full_name</code>, <code>hire_date</code> (YYYY-MM-DD), <code>target_net</code><br/>
                Optional: <code>national_id</code>, <code>department</code>, <code>job_title</code>, <code>status</code> (active/inactive)
              </div>
            </div>
          </>)}

          {/* ── PREVIEW ── */}
          {step === 'preview' && (<>
            <div style={{ display:'flex', gap:12, marginBottom:16 }}>
              <div style={{ flex:1, background:'var(--success-bg)', border:'1px solid #B2DFCC', borderRadius:6, padding:'10px 14px', textAlign:'center' }}>
                <div style={{ fontSize:22, fontWeight:700, color:'var(--success)' }}>{validRows.length}</div>
                <div style={{ fontSize:12, color:'var(--success)' }}>Ready to insert</div>
              </div>
              <div style={{ flex:1, background:'var(--danger-bg)', border:'1px solid #F5C6C2', borderRadius:6, padding:'10px 14px', textAlign:'center' }}>
                <div style={{ fontSize:22, fontWeight:700, color:'var(--danger)' }}>{invalidRows.length}</div>
                <div style={{ fontSize:12, color:'var(--danger)' }}>Will be skipped</div>
              </div>
            </div>

            <div style={{ maxHeight:320, overflowY:'auto', border:'1px solid var(--border)', borderRadius:6 }}>
              <table style={{ fontSize:12 }}>
                <thead>
                  <tr>
                    <th style={{ width:40 }}>#</th>
                    <th>Name</th><th>Department</th><th>Hire Date</th><th>Target Net</th><th>Status</th><th>Issues</th>
                  </tr>
                </thead>
                <tbody>
                  {parsed.rows.map(row => {
                    const errs = validateRow(row);
                    const ok = errs.length === 0;
                    return (
                      <tr key={row._line} style={{ background: ok ? '' : '#FFF8F8' }}>
                        <td style={{ color:'var(--ink-light)' }}>{row._line}</td>
                        <td style={{ fontWeight:500 }}>{row.full_name || <span style={{color:'var(--danger)'}}>—</span>}</td>
                        <td>{row.department || '—'}</td>
                        <td style={{ color: /^\d{4}-\d{2}-\d{2}$/.test(row.hire_date) ? 'inherit' : 'var(--danger)' }}>{row.hire_date || '—'}</td>
                        <td style={{ color: !isNaN(Number(row.target_net)) && row.target_net ? 'inherit' : 'var(--danger)' }}>{row.target_net || '—'}</td>
                        <td>{row.status || 'active'}</td>
                        <td style={{ color:'var(--danger)', fontSize:11 }}>{errs.join('; ') || <span style={{color:'var(--success)'}}>✓</span>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {invalidRows.length > 0 && (
              <div className="alert alert-info" style={{ marginTop:12, marginBottom:0 }}>
                {invalidRows.length} row(s) with errors will be skipped. Valid rows will still be inserted.
              </div>
            )}
          </>)}

          {/* ── UPLOADING ── */}
          {step === 'uploading' && (
            <div style={{ textAlign:'center', padding:'40px 0' }}>
              <div style={{ fontSize:36, marginBottom:12 }}>⏳</div>
              <div style={{ fontWeight:500 }}>Inserting employees…</div>
            </div>
          )}

          {/* ── DONE ── */}
          {step === 'done' && results && (
            <div style={{ textAlign:'center', padding:'24px 0' }}>
              <div style={{ fontSize:48, marginBottom:12 }}>{results.inserted > 0 ? '✅' : '⚠️'}</div>
              <div style={{ fontSize:18, fontWeight:700, marginBottom:8 }}>
                {results.inserted} employee{results.inserted !== 1 ? 's' : ''} added successfully
              </div>
              {results.failed > 0 && <div style={{ color:'var(--danger)', marginBottom:8 }}>{results.failed} rows failed to insert (database error)</div>}
              {results.skipped.length > 0 && (
                <div style={{ color:'var(--ink-light)', fontSize:13 }}>
                  {results.skipped.length} row(s) skipped due to validation errors
                </div>
              )}
            </div>
          )}
        </div>

        <div className="modal-footer">
          {step === 'idle'     && <button className="btn btn-secondary" onClick={onClose}>Close</button>}
          {step === 'preview'  && <>
            <button className="btn btn-secondary" onClick={() => setStep('idle')}>← Back</button>
            <button className="btn btn-primary" onClick={upload} disabled={validRows.length === 0}>
              Insert {validRows.length} Employee{validRows.length !== 1 ? 's' : ''}
            </button>
          </>}
          {step === 'done'     && <button className="btn btn-primary" onClick={onClose}>Done</button>}
        </div>
      </div>
    </div>
  );
}

// ── FIELD (defined outside any component to preserve focus) ──────────────────
function Field({ label, field, type='text', placeholder='', form, setForm }) {
  return (
    <div className="form-group">
      <label>{label}</label>
      <input
        type={type}
        placeholder={placeholder}
        value={form[field] || ''}
        onChange={e => setForm(p => ({ ...p, [field]: e.target.value }))}
      />
    </div>
  );
}

function Modal({ title, onClose, children, footer }) {
  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">{title}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

// Split into two components so the modal form never re-renders due to table state changes

    <Modal title={modal === 'add' ? 'Add Employee' : 'Edit Employee'} onClose={onClose}
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={onSave} disabled={saving}>{saving ? <><span className="spinner"></span> Saving…</> : 'Save Employee'}</button>
      </>}>
      <div className="form-grid">
        <Field label="Full Name *" field="full_name" placeholder="Ahmed Hassan" form={form} setForm={setForm} />
        <Field label="National ID" field="national_id" placeholder="29901011234567" form={form} setForm={setForm} />
        <Field label="Department" field="department" placeholder="Sales" form={form} setForm={setForm} />
        <Field label="Job Title" field="job_title" placeholder="Sales Manager" form={form} setForm={setForm} />

function EmployeesTab() {
  const [employees, setEmployees] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState('');
  const [form, setForm] = useState({...BLANK_EMP});
  const [showBulk, setShowBulk] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    const { data } = await sb.from('employees').select('*').order('full_name');
    setEmployees(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const openAdd  = () => { setForm({...BLANK_EMP}); setModal('add'); };
  const openEdit = (emp) => { setForm({...emp}); setModal(emp); };
  const closeModal = () => setModal(null);

  const save = async () => {
    if (!form.full_name || !form.hire_date || !form.target_net) {
      alert('Name, hire date, and target net are required.');
      return;
    }
    setSaving(true);
    if (modal === 'add') {
      await sb.from('employees').insert({ ...form, target_net: Number(form.target_net) });
    } else {
      await sb.from('employees').update({ ...form, target_net: Number(form.target_net) }).eq('id', modal.id);
    }
    setSaving(false);
    setModal(null);
    load();
  };

  const toggle = async (emp) => {
    await sb.from('employees').update({ status: emp.status === 'active' ? 'inactive' : 'active' }).eq('id', emp.id);
    load();
  };

  const filtered = employees.filter(e =>
    e.full_name.toLowerCase().includes(search.toLowerCase()) ||
    (e.department||'').toLowerCase().includes(search.toLowerCase())
  );
  const active = employees.filter(e => e.status === 'active').length;

  return (
    <>
      <div className="stats">
        <div className="stat accent">
          <div className="stat-label">Total Employees</div>
          <div className="stat-value">{employees.length}</div>
        </div>
        <div className="stat gold">
          <div className="stat-label">Active</div>
          <div className="stat-value">{active}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Inactive</div>
          <div className="stat-value">{employees.length - active}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Departments</div>
          <div className="stat-value">{[...new Set(employees.map(e => e.department).filter(Boolean))].length}</div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <div className="card-title">Employee Directory</div>
          <div className="flex">
            <input placeholder="Search name or department…" value={search} onChange={e => setSearch(e.target.value)} style={{ width:220 }} />
            <button className="btn btn-secondary" onClick={() => setShowBulk(true)}>⬆⬇ Bulk / Export</button>
            <button className="btn btn-primary" onClick={openAdd}>+ Add Employee</button>
          </div>
        </div>
        <div className="tbl-wrap">
          {loading ? <div className="empty"><div className="empty-text">Loading…</div></div> :
          filtered.length === 0 ? <div className="empty"><div className="empty-icon">👤</div><div className="empty-text">No employees yet. Add one to get started.</div></div> :
          <table>
            <thead>
              <tr>
                <th>Name</th><th>National ID</th><th>Department</th><th>Job Title</th>
                <th>Hire Date</th><th className="tbl-num">Target Net (EGP)</th><th>Bank</th><th>Account No.</th><th>Status</th><th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(emp => (
                <tr key={emp.id}>
                  <td style={{ fontWeight:500 }}>{emp.full_name}</td>
                  <td className="text-muted">{emp.national_id || '—'}</td>
                  <td>{emp.department || '—'}</td>
                  <td>{emp.job_title || '—'}</td>
                  <td>{emp.hire_date}</td>
                  <td className="tbl-num">{fmt(emp.target_net)}</td>
                  <td>{emp.bank_name || '—'}</td>
                  <td>{emp.account_number || '—'}</td>
                  <td><span className={`badge badge-${emp.status}`}>{emp.status}</span></td>
                  <td>
                    <div className="flex">
                      <button className="btn btn-secondary btn-sm" onClick={() => openEdit(emp)}>Edit</button>
                      <button className="btn btn-sm" style={{ background:'none', color:'var(--ink-light)', border:'1px solid var(--border)' }} onClick={() => toggle(emp)}>
                        {emp.status === 'active' ? 'Deactivate' : 'Activate'}
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>}
        </div>
      </div>

      {showBulk && <BulkModal onClose={() => setShowBulk(false)} onDone={load} employees={employees} />}
      <EmpModal modal={modal} form={form} setForm={setForm} saving={saving} onClose={closeModal} onSave={save} />
    </>
  );
}

// ── RUN PAYROLL TAB ───────────────────────────────────────────────────────────
function RunPayrollTab({ onRunCreated }) {
  const [month, setMonth] = useState(today().slice(0,7));
  const [closing, setClosing] = useState(today());
  const [preview, setPreview] = useState(null);
  const [calculating, setCalculating] = useState(false);
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  const calculate = async () => {
    setCalculating(true);
    setMsg(null);
    const { data: emps } = await sb.from('employees').select('*').eq('status', 'active');
    if (!emps || emps.length === 0) { setMsg({ type:'danger', text:'No active employees found.' }); setCalculating(false); return; }
    const lines = emps.map(e => calcEmployee(e, closing));
    setPreview(lines);
    setCalculating(false);
  };

  const finalize = async () => {
    if (!preview) return;
    setSaving(true);
    const { data: run, error } = await sb.from('payroll_runs').insert({ month, closing_date: closing, status: 'draft' }).select().single();
    if (error) { setMsg({ type:'danger', text:'Failed to create run: ' + error.message }); setSaving(false); return; }
    const inserts = preview.map(l => ({ run_id: run.id, employee_id: l.employee_id, pro_rata_factor: l.pro_rata_factor, gross_full: l.gross_full, si_base: l.si_base, emp_si: l.emp_si, annual_taxable: l.annual_taxable, monthly_tax: l.monthly_tax, total_deductions: l.total_deductions, net_full: l.net_full, employer_si: l.employer_si, dispensed_gross: l.dispensed_gross, dispensed_emp_si: l.dispensed_emp_si, dispensed_tax: l.dispensed_tax, dispensed_deductions: l.dispensed_deductions, dispensed_net: l.dispensed_net, dispensed_er_si: l.dispensed_er_si, total_employer_cost: l.total_employer_cost }));
    await sb.from('payroll_lines').insert(inserts);
    await sb.from('payroll_runs').update({ status: 'finalized' }).eq('id', run.id);
    setMsg({ type:'success', text:'Payroll run finalized and saved.' });
    setPreview(null);
    setSaving(false);
    if (onRunCreated) onRunCreated();
  };

  const totals = preview ? {
    dispensed_gross: preview.reduce((s,l) => s + l.dispensed_gross, 0),
    dispensed_emp_si: preview.reduce((s,l) => s + l.dispensed_emp_si, 0),
    dispensed_tax: preview.reduce((s,l) => s + l.dispensed_tax, 0),
    dispensed_net: preview.reduce((s,l) => s + l.dispensed_net, 0),
    dispensed_er_si: preview.reduce((s,l) => s + l.dispensed_er_si, 0),
    total_employer_cost: preview.reduce((s,l) => s + l.total_employer_cost, 0),
  } : null;

  return (
    <>
      {msg && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}
      <div className="card mb-24">
        <div className="card-header"><div className="card-title">Payroll Run Parameters</div></div>
        <div className="card-body">
          <div className="form-grid-3">
            <div className="form-group">
              <label>Payroll Month</label>
              <input type="month" value={month} onChange={e => setMonth(e.target.value)} />
            </div>
            <div className="form-group">
              <label>Month Closing Date</label>
              <input type="date" value={closing} onChange={e => setClosing(e.target.value)} />
            </div>
            <div className="form-group" style={{ justifyContent:'flex-end' }}>
              <label>&nbsp;</label>
              <button className="btn btn-primary" onClick={calculate} disabled={calculating}>
                {calculating ? <><span className="spinner"></span> Calculating…</> : '⚡ Calculate Payroll'}
              </button>
            </div>
          </div>
        </div>
      </div>

      {preview && (
        <>
          <div className="stats mb-24">
            <div className="stat accent">
              <div className="stat-label">Employees</div>
              <div className="stat-value">{preview.length}</div>
            </div>
            <div className="stat gold">
              <div className="stat-label">Total Dispensed Net</div>
              <div className="stat-value" style={{ fontSize:18 }}>EGP {fmt(totals.dispensed_net)}</div>
            </div>
            <div className="stat">
              <div className="stat-label">Total Gross</div>
              <div className="stat-value" style={{ fontSize:18 }}>EGP {fmt(totals.dispensed_gross)}</div>
            </div>
            <div className="stat">
              <div className="stat-label">Total Employer Cost</div>
              <div className="stat-value" style={{ fontSize:18 }}>EGP {fmt(totals.total_employer_cost)}</div>
            </div>
          </div>

          <div className="card mb-24">
            <div className="card-header">
              <div className="card-title">Payroll Preview — {monthLabel(month)}</div>
              <div className="flex">
                <div className="alert alert-info" style={{ margin:0, padding:'6px 12px' }}>Review before finalizing</div>
                <button className="btn btn-gold" onClick={finalize} disabled={saving}>
                  {saving ? <><span className="spinner"></span> Saving…</> : '✔ Finalize & Save'}
                </button>
              </div>
            </div>
            <div className="tbl-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Employee</th><th>Department</th><th>Pro-Rata</th>
                    <th className="tbl-num">Full Gross</th>
                    <th className="tbl-num">Emp SI</th>
                    <th className="tbl-num">Tax</th>
                    <th className="tbl-num">Disp. Gross</th>
                    <th className="tbl-num">Disp. Deductions</th>
                    <th className="tbl-num" style={{ color:'var(--success)' }}>Dispensed Net ★</th>
                    <th className="tbl-num">Employer Cost</th>
                  </tr>
                </thead>
                <tbody>
                  {preview.map(l => (
                    <tr key={l.employee_id}>
                      <td style={{ fontWeight:500 }}>{l.name}</td>
                      <td className="text-muted">{l.department || '—'}</td>
                      <td>
                        {l.pro_rata_factor < 1
                          ? <span className="pro-rata-badge">{fmtPct(l.pro_rata_factor)}</span>
                          : <span style={{ color:'var(--ink-light)', fontSize:12 }}>Full</span>}
                      </td>
                      <td className="tbl-num">{fmt(l.gross_full)}</td>
                      <td className="tbl-num">{fmt(l.emp_si)}</td>
                      <td className="tbl-num">{fmt(l.monthly_tax)}</td>
                      <td className="tbl-num">{fmt(l.dispensed_gross)}</td>
                      <td className="tbl-num">{fmt(l.dispensed_deductions)}</td>
                      <td className="tbl-num text-success">{fmt(l.dispensed_net)}</td>
                      <td className="tbl-num">{fmt(l.total_employer_cost)}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr className="tbl-total">
                    <td colSpan={3}>TOTALS</td>
                    <td className="tbl-num">{fmt(preview.reduce((s,l)=>s+l.gross_full,0))}</td>
                    <td className="tbl-num">{fmt(preview.reduce((s,l)=>s+l.emp_si,0))}</td>
                    <td className="tbl-num">{fmt(preview.reduce((s,l)=>s+l.monthly_tax,0))}</td>
                    <td className="tbl-num">{fmt(totals.dispensed_gross)}</td>
                    <td className="tbl-num">{fmt(totals.dispensed_emp_si + totals.dispensed_tax)}</td>
                    <td className="tbl-num text-success">{fmt(totals.dispensed_net)}</td>
                    <td className="tbl-num">{fmt(totals.total_employer_cost)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </>
      )}
    </>
  );
}

// ── HISTORY TAB ───────────────────────────────────────────────────────────────
function HistoryTab({ onViewRun }) {
  const [runs, setRuns] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const { data } = await sb.from('payroll_runs').select('*').order('closing_date', { ascending: false });
      setRuns(data || []);
      setLoading(false);
    })();
  }, []);

  return (
    <div className="card">
      <div className="card-header"><div className="card-title">Payroll History</div></div>
      {loading ? <div className="empty"><div className="empty-text">Loading…</div></div> :
      runs.length === 0 ? <div className="empty"><div className="empty-icon">📋</div><div className="empty-text">No payroll runs yet.</div></div> :
      <div className="tbl-wrap">
        <table>
          <thead><tr><th>Month</th><th>Closing Date</th><th>Status</th><th>Created</th><th></th></tr></thead>
          <tbody>
            {runs.map(r => (
              <tr key={r.id}>
                <td style={{ fontWeight:500 }}>{monthLabel(r.month)}</td>
                <td>{r.closing_date}</td>
                <td><span className={`badge badge-${r.status}`}>{r.status}</span></td>
                <td className="text-muted">{new Date(r.created_at).toLocaleDateString('en-EG')}</td>
                <td><button className="btn btn-secondary btn-sm" onClick={() => onViewRun(r)}>View Register</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>}
    </div>
  );
}

// ── REGISTER VIEW ─────────────────────────────────────────────────────────────
function RegisterView({ run, onBack, onViewPayslip }) {
  const [lines, setLines] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const { data } = await sb.from('payroll_lines')
        .select('*, employees(full_name, department, job_title, hire_date, national_id, bank_name, account_number)')
        .eq('run_id', run.id)
        .order('employees(full_name)');
      setLines(data || []);
      setLoading(false);
    })();
  }, [run.id]);

  const exportCSV = () => {
    const headers = ['Name','Department','Pro-Rata','Full Gross','Emp SI','Monthly Tax','Total Ded.','Disp. Gross','Disp. Emp SI','Disp. Tax','Disp. Ded.','Dispensed Net','Disp. Employer SI','Total Employer Cost'];
    const rows = lines.map(l => [
      l.employees?.full_name, l.employees?.department, fmtPct(l.pro_rata_factor),
      l.gross_full, l.emp_si, l.monthly_tax, l.total_deductions,
      l.dispensed_gross, l.dispensed_emp_si, l.dispensed_tax, l.dispensed_deductions,
      l.dispensed_net, l.dispensed_er_si, l.total_employer_cost
    ]);
    const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = `Eterna_Payroll_${run.month}.csv`;
    a.click();
  };

  const totals = lines.reduce((s, l) => ({
    dispensed_gross: s.dispensed_gross + (l.dispensed_gross||0),
    dispensed_net: s.dispensed_net + (l.dispensed_net||0),
    total_employer_cost: s.total_employer_cost + (l.total_employer_cost||0),
    dispensed_deductions: s.dispensed_deductions + (l.dispensed_deductions||0),
  }), { dispensed_gross:0, dispensed_net:0, total_employer_cost:0, dispensed_deductions:0 });

  return (
    <>
      <div className="flex mb-24">
        <button className="btn btn-secondary" onClick={onBack}>← Back to History</button>
        <div style={{ fontWeight:600, fontSize:16 }}>Register — {monthLabel(run.month)}</div>
        <span className={`badge badge-${run.status}`}>{run.status}</span>
        <button className="btn btn-secondary btn-sm" onClick={exportCSV}>⬇ Export CSV</button>
      </div>

      <div className="stats mb-24">
        <div className="stat accent"><div className="stat-label">Employees</div><div className="stat-value">{lines.length}</div></div>
        <div className="stat gold"><div className="stat-label">Dispensed Net</div><div className="stat-value" style={{fontSize:17}}>EGP {fmt(totals.dispensed_net)}</div></div>
        <div className="stat"><div className="stat-label">Dispensed Gross</div><div className="stat-value" style={{fontSize:17}}>EGP {fmt(totals.dispensed_gross)}</div></div>
        <div className="stat"><div className="stat-label">Total Employer Cost</div><div className="stat-value" style={{fontSize:17}}>EGP {fmt(totals.total_employer_cost)}</div></div>
      </div>

      <div className="card">
        <div className="tbl-wrap">
          {loading ? <div className="empty"><div className="empty-text">Loading…</div></div> :
          <table>
            <thead>
              <tr>
                <th>Employee</th><th>Dept</th><th>Pro-Rata</th>
                <th className="tbl-num">Disp. Gross</th>
                <th className="tbl-num">Emp SI</th>
                <th className="tbl-num">Tax</th>
                <th className="tbl-num">Disp. Ded.</th>
                <th className="tbl-num" style={{color:'var(--success)'}}>Dispensed Net ★</th>
                <th className="tbl-num">Employer Cost</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {lines.map(l => (
                <tr key={l.id}>
                  <td style={{fontWeight:500}}>{l.employees?.full_name}</td>
                  <td className="text-muted">{l.employees?.department||'—'}</td>
                  <td>{l.pro_rata_factor < 1 ? <span className="pro-rata-badge">{fmtPct(l.pro_rata_factor)}</span> : <span className="text-muted" style={{fontSize:12}}>Full</span>}</td>
                  <td className="tbl-num">{fmt(l.dispensed_gross)}</td>
                  <td className="tbl-num">{fmt(l.dispensed_emp_si)}</td>
                  <td className="tbl-num">{fmt(l.dispensed_tax)}</td>
                  <td className="tbl-num">{fmt(l.dispensed_deductions)}</td>
                  <td className="tbl-num text-success">{fmt(l.dispensed_net)}</td>
                  <td className="tbl-num">{fmt(l.total_employer_cost)}</td>
                  <td><button className="btn btn-secondary btn-sm" onClick={() => onViewPayslip({ line: l, run })}>Payslip</button></td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr className="tbl-total">
                <td colSpan={3}>TOTALS</td>
                <td className="tbl-num">{fmt(totals.dispensed_gross)}</td>
                <td className="tbl-num">{fmt(lines.reduce((s,l)=>s+(l.dispensed_emp_si||0),0))}</td>
                <td className="tbl-num">{fmt(lines.reduce((s,l)=>s+(l.dispensed_tax||0),0))}</td>
                <td className="tbl-num">{fmt(totals.dispensed_deductions)}</td>
                <td className="tbl-num text-success">{fmt(totals.dispensed_net)}</td>
                <td className="tbl-num">{fmt(totals.total_employer_cost)}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>}
        </div>
      </div>
    </>
  );
}

// ── PAYSLIP VIEW ──────────────────────────────────────────────────────────────
function PayslipView({ data, onBack }) {
  const { line, run } = data;
  const emp = line.employees || {};
  const print = () => window.print();

  return (
    <div className="payslip-wrap">
      <div className="flex mb-24" style={{justifyContent:'space-between'}}>
        <button className="btn btn-secondary" onClick={onBack}>← Back</button>
        <button className="btn btn-primary" onClick={print}>🖨 Print / Save PDF</button>
      </div>
      <div className="payslip">
        <div className="payslip-header">
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <div>
              <div className="payslip-co">ETERNA</div>
              <div className="payslip-sub">Developments</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div className="payslip-title">Pay Slip</div>
              <div className="payslip-month">{monthLabel(run.month)}</div>
            </div>
          </div>
        </div>

        <div className="payslip-body">
          <div className="payslip-meta">
            <div className="meta-row"><span className="meta-key">Employee Name</span><span className="meta-val">{emp.full_name}</span></div>
            <div className="meta-row"><span className="meta-key">National ID</span><span className="meta-val">{emp.national_id || '—'}</span></div>
            <div className="meta-row"><span className="meta-key">Job Title</span><span className="meta-val">{emp.job_title || '—'}</span></div>
            <div className="meta-row"><span className="meta-key">Department</span><span className="meta-val">{emp.department || '—'}</span></div>
            <div className="meta-row"><span className="meta-key">Hire Date</span><span className="meta-val">{emp.hire_date}</span></div>
            <div className="meta-row"><span className="meta-key">Closing Date</span><span className="meta-val">{run.closing_date}</span></div>
            {emp.bank_name && <div className="meta-row"><span className="meta-key">Bank</span><span className="meta-val">{emp.bank_name}</span></div>}
            {emp.account_number && <div className="meta-row"><span className="meta-key">Account No.</span><span className="meta-val">{emp.account_number}</span></div>}
            {line.pro_rata_factor < 1 && (
              <div className="meta-row"><span className="meta-key">Pro-Rata Factor</span><span className="meta-val" style={{color:'var(--gold)'}}>{fmtPct(line.pro_rata_factor)} (partial month)</span></div>
            )}
          </div>

          <div className="payslip-section">
            <div className="payslip-section-title">Earnings</div>
            <div className="payslip-line">
              <span>Gross Salary {line.pro_rata_factor < 1 ? `(${fmtPct(line.pro_rata_factor)} of EGP ${fmt(line.gross_full)})` : ''}</span>
              <span style={{fontWeight:600}}>EGP {fmt(line.dispensed_gross)}</span>
            </div>
          </div>

          <div className="payslip-section">
            <div className="payslip-section-title">Deductions</div>
            <div className="payslip-line">
              <span>Social Insurance (Employee 11%)</span>
              <span style={{color:'var(--danger)'}}>− EGP {fmt(line.dispensed_emp_si)}</span>
            </div>
            <div className="payslip-line">
              <span>Income Tax (Law 7/2024)</span>
              <span style={{color:'var(--danger)'}}>− EGP {fmt(line.dispensed_tax)}</span>
            </div>
            <div className="payslip-line" style={{fontWeight:600}}>
              <span>Total Deductions</span>
              <span style={{color:'var(--danger)'}}>− EGP {fmt(line.dispensed_deductions)}</span>
            </div>
          </div>

          <div className="payslip-total">
            <div className="payslip-total-label">Net Salary to Dispense</div>
            <div className="payslip-total-value">EGP {fmt(line.dispensed_net)}</div>
          </div>

          <div className="payslip-employer">
            <div style={{fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:'var(--ink-light)', marginBottom:8}}>Employer Cost (Confidential)</div>
            <div className="payslip-line" style={{borderBottom:'1px solid #E8E8E8'}}>
              <span>Gross Salary</span><span>EGP {fmt(line.dispensed_gross)}</span>
            </div>
            <div className="payslip-line" style={{borderBottom:'1px solid #E8E8E8'}}>
              <span>Employer SI (18.75%)</span><span>EGP {fmt(line.dispensed_er_si)}</span>
            </div>
            <div className="payslip-line" style={{fontWeight:700}}>
              <span>Total Employer Cost</span><span>EGP {fmt(line.total_employer_cost)}</span>
            </div>
          </div>
        </div>

        <div className="payslip-footer">
          <span>Generated: {new Date().toLocaleDateString('en-EG')}</span>
          <span>CONFIDENTIAL — Eterna Developments</span>
        </div>
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  if (!isConfigured) return <SetupScreen />;

  const [tab, setTab] = useState('employees');
  const [historyView, setHistoryView] = useState(null); // null | run obj
  const [payslipData, setPayslipData] = useState(null);

  const nav = [
    { id:'employees', icon:'👥', label:'Employees' },
    { id:'run',       icon:'⚡', label:'Run Payroll' },
    { id:'history',   icon:'📋', label:'History' },
  ];

  const tabLabel = { employees:'Employees', run:'Run Payroll', history: payslipData ? 'Payslip' : historyView ? 'Payroll Register' : 'History' };

  const showPayslip = (data) => { setPayslipData(data); };
  const backFromPayslip = () => setPayslipData(null);
  const backFromRegister = () => { setHistoryView(null); setPayslipData(null); };

  const renderContent = () => {
    if (payslipData) return <PayslipView data={payslipData} onBack={backFromPayslip} />;
    if (tab === 'employees') return <EmployeesTab />;
    if (tab === 'run') return <RunPayrollTab onRunCreated={() => {}} />;
    if (tab === 'history') {
      if (historyView) return <RegisterView run={historyView} onBack={backFromRegister} onViewPayslip={showPayslip} />;
      return <HistoryTab onViewRun={r => setHistoryView(r)} />;
    }
  };

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="co">ETERNA</div>
          <div className="sub">Payroll System</div>
        </div>
        <div className="nav">
          {nav.map(n => (
            <div key={n.id} className={`nav-item ${tab === n.id ? 'active' : ''}`}
              onClick={() => { setTab(n.id); setHistoryView(null); setPayslipData(null); }}>
              <span className="nav-icon">{n.icon}</span>
              <span>{n.label}</span>
            </div>
          ))}
        </div>
        <div className="sidebar-footer">Egypt Payroll 2026<br/>Law 7/2024 · NOSI Jan 2026</div>
      </div>

      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{tabLabel[tab]}</div>
          <div className="topbar-badge">Eterna Developments</div>
        </div>
        <div className="content">
          {renderContent()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
